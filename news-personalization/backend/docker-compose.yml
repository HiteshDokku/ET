version: "3.9"

services:

  # ── FastAPI app ──────────────────────────────────────────────
  api:
    build: .
    container_name: my_et_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app          # live-reload: changes reflect instantly
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    mem_limit: 1g  

  # ── Celery worker (runs background jobs) ────────────────────
  celery_worker:
    build: .
    container_name: my_et_celery
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: celery -A app.celery_app.celery_config worker --loglevel=info
    mem_limit: 1g  

  # ── Celery Beat (scheduler — runs jobs every N minutes) ─────
  celery_beat:
    build: .
    container_name: my_et_beat
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.celery_app.celery_config beat --loglevel=info

  # ── Redis (cache + message broker) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: my_et_redis
    ports:
      - "6379:6379"

  # ── PostgreSQL (main database) ───────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: my_et_postgres
    environment:
      POSTGRES_USER: etuser
      POSTGRES_PASSWORD: etpassword
      POSTGRES_DB: et_newsroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
