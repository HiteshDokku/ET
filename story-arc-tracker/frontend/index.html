<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Story Arc Tracker — Transform news articles into interactive story arcs with AI-powered analysis.">
    <title>Story Arc Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ─── Loading Overlay ─────────────────────────────────── -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loader-content">
            <div class="pulse-ring"></div>
            <div class="pulse-ring delay-1"></div>
            <div class="pulse-ring delay-2"></div>
            <div class="loader-icon">⚡</div>
            <p class="loader-text">Analyzing articles with AI…</p>
            <p class="loader-sub">Extracting events, entities & insights</p>
        </div>
    </div>

    <!-- ─── Header ──────────────────────────────────────────── -->
    <header id="app-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <h1>Story Arc Tracker</h1>
            </div>
            <p class="tagline">Transform articles into interactive story arcs</p>
        </div>
    </header>

    <!-- ─── Input Section ───────────────────────────────────── -->
    <section id="input-section" class="glass-card">
        <h2 class="section-title"><span class="accent-dot"></span>Input Articles</h2>
        <div class="input-grid">
            <div class="field">
                <label for="topic-input">Topic</label>
                <input type="text" id="topic-input" placeholder="e.g. Tesla, AI Regulation, Climate Policy…" />
            </div>
            <div class="field full-width">
                <label for="articles-input">Articles (JSON array)</label>
                <textarea id="articles-input" rows="12" placeholder='[
  {
    "id": "art-1",
    "title": "Article Title",
    "content": "Full article text here..."
  },
  {
    "id": "art-2",
    "title": "Another Article",
    "content": "Article content..."
  }
]'></textarea>
            </div>
        </div>
        <button id="analyze-btn" class="btn-primary" onclick="handleAnalyze()">
            <span class="btn-icon">▶</span> Analyze Story
        </button>
    </section>

    <!-- ─── Results Container (hidden until data) ───────────── -->
    <div id="results-container" class="hidden">

        <!-- Story Summary -->
        <section id="summary-section" class="glass-card">
            <h2 class="section-title"><span class="accent-dot"></span>Story Summary</h2>
            <p id="story-summary" class="summary-text"></p>
        </section>

        <!-- Timeline -->
        <section id="timeline-section" class="glass-card">
            <h2 class="section-title"><span class="accent-dot"></span>Event Timeline</h2>
            <div id="timeline-container" class="timeline"></div>
        </section>

        <!-- Event Detail Panel (hidden until event click) -->
        <section id="event-detail-panel" class="glass-card detail-panel hidden">
            <button id="close-detail" class="close-btn" onclick="closeDetail()">✕</button>
            <h3 id="detail-title" class="detail-title"></h3>
            <span id="detail-date" class="detail-date"></span>
            <span id="detail-sentiment" class="sentiment-badge"></span>
            <p id="detail-summary" class="detail-summary"></p>
            <div id="detail-entities" class="detail-entities"></div>
            <div id="detail-sources" class="detail-sources"></div>
        </section>

        <!-- Key Players -->
        <section id="players-section" class="glass-card">
            <h2 class="section-title"><span class="accent-dot"></span>Key Players</h2>
            <div id="players-grid" class="players-grid"></div>
        </section>

        <!-- Sentiment Overview -->
        <section id="sentiment-section" class="glass-card">
            <h2 class="section-title"><span class="accent-dot"></span>Sentiment Overview</h2>
            <div class="sentiment-row">
                <div id="overall-sentiment" class="overall-badge"></div>
                <div id="sentiment-trend" class="trend-bar"></div>
            </div>
        </section>

        <!-- Contrarian Insights -->
        <section id="contrarian-section" class="glass-card">
            <h2 class="section-title"><span class="accent-dot"></span>Contrarian Insights</h2>
            <div id="mainstream-view" class="mainstream-box"></div>
            <div id="contrarian-views" class="contrarian-list"></div>
        </section>

        <!-- What to Watch -->
        <section id="predictions-section" class="glass-card">
            <h2 class="section-title"><span class="accent-dot"></span>What to Watch Next</h2>
            <div id="predictions-list" class="predictions-grid"></div>
        </section>

    </div>

    <footer>
        <p>Story Arc Tracker · Powered by AI</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
