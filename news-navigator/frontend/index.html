<!DOCTYPE html>
<html>

<head>
    <title>News Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        Economic Times — AI News Navigator
    </div>

    <div class="container">

        <input id="topic" placeholder="Enter topic (e.g. RBI, LPG shortage, Markets, Startup funding)"
            class="topic-input" />

        <button onclick="generate()">Generate Intelligence Briefing</button>

        <div id="briefing"></div>

        <div id="followups"></div>

        <h2>Sources</h2>
        <div id="sources"></div>

        <input id="question" placeholder="Ask follow up question">
        <button onclick="ask()">Ask</button>

        <div id="answer"></div>

    </div>

    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
